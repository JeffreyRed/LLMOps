# ============================================================
# CI Pipeline — Agentic RAG Pipeline
# Runs automatically on every push and pull request to main
# ============================================================

name: LLMOps CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Code Quality ──────────────────────────────────
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: |
          pip install flake8 black

      - name: Check formatting with Black
        run: |
          black --check *.py
        # Black enforces consistent code style.
        # If formatting is wrong, the CI fails and tells you exactly what to fix.

      - name: Lint with Flake8
        run: |
          flake8 *.py --max-line-length=100 --ignore=E203,W503
        # Catches unused imports, undefined variables, syntax errors, etc.

  # ── Job 2: Unit Tests ────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint  # only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        env:
          # GitHub Secrets — set these in your repo Settings → Secrets
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "agentic-rag-ci"
        run: |
          pytest tests/ -v --cov=. --cov-report=term-missing
        # --cov generates a coverage report showing which lines of code
        # are actually tested. Aim for >70% coverage.

  # ── Job 3: Prompt Eval (LLMOps core) ────────────────────
  eval:
    name: 📊 Prompt Evaluation
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download & build vector store (small subset)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "agentic-rag-ci"
        run: |
          # Use only 20 articles in CI to keep it fast & cheap
          python -c "
          import os
          os.environ['NUM_ARTICLES_OVERRIDE'] = '20'
          exec(open('ingest.py').read())
          "

      - name: Run evaluation suite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "agentic-rag-ci"
        run: |
          python evaluate.py

      - name: Check eval score threshold
        run: |
          python -c "
          import json, sys
          report = json.load(open('data/eval_report.json'))
          avg = report['avg_score']
          print(f'Average eval score: {avg}')
          # CI fails if average keyword score drops below 0.35
          # This is your quality gate — adjust as your project matures
          if avg < 0.35:
              print(f'FAIL: Score {avg} is below threshold 0.35')
              sys.exit(1)
          else:
              print(f'PASS: Score {avg} meets threshold')
          "
        # This is the LLMOps magic:
        # If you change your prompt and the agent gets worse, CI catches it
        # before it ever merges to main.

      - name: Upload eval report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.sha }}
          path: data/eval_report.json
          retention-days: 30
        # Every CI run stores its eval report.
        # You can download and compare them over time to track quality trends.